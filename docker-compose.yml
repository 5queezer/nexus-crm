services:
  app:
    image: ghcr.io/5queezer/job-tracker:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - ./data:/app/prisma
      - ./uploads:/app/uploads
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - PORT=3001
